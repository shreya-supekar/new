<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Hand Gesture Locomotion Template</title>
    <!-- Import A-Frame (v1.5.0 provides excellent WebXR Hand Tracking support) -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
        /**
         * 1. GRAB AND PULL LOCOMOTION COMPONENT
         * This component allows the user to 'grab' the air by pinching and 
         * then move their hand to pull themselves through the world.
         */
        AFRAME.registerComponent('grab-locomotion', {
            schema: {
                multiplier: { type: 'number', default: 2.0 }, // Sensitivity of the pull
                leftHand: { type: 'selector', default: '#leftHand' },
                rightHand: { type: 'selector', default: '#rightHand' }
            },

            init: function () {
                this.isLeftGrabbing = false;
                this.isRightGrabbing = false;
                
                // Track positions to calculate movement delta
                this.prevLeftPos = new THREE.Vector3();
                this.prevRightPos = new THREE.Vector3();
                
                this.statusText = document.querySelector('#status-text');

                // Bind events for Left Hand
                if (this.data.leftHand) {
                    this.data.leftHand.addEventListener('pinchstarted', () => {
                        this.isLeftGrabbing = true;
                        this.prevLeftPos.copy(this.data.leftHand.object3D.position);
                    });
                    this.data.leftHand.addEventListener('pinchended', () => {
                        this.isLeftGrabbing = false;
                    });
                }

                // Bind events for Right Hand
                if (this.data.rightHand) {
                    this.data.rightHand.addEventListener('pinchstarted', () => {
                        this.isRightGrabbing = true;
                        this.prevRightPos.copy(this.data.rightHand.object3D.position);
                    });
                    this.data.rightHand.addEventListener('pinchended', () => {
                        this.isRightGrabbing = false;
                    });
                }
            },

            tick: function () {
                let moving = false;
                const rigPos = this.el.object3D.position;

                // Process Left Hand Movement
                if (this.isLeftGrabbing && this.data.leftHand) {
                    const currentPos = this.data.leftHand.object3D.position;
                    const delta = new THREE.Vector3().subVectors(currentPos, this.prevLeftPos);
                    
                    // We only want horizontal movement (X and Z)
                    delta.y = 0; 
                    
                    // Apply inverse movement to rig (pulling hand back moves player forward)
                    rigPos.addScaledVector(delta, -this.data.multiplier);
                    
                    this.prevLeftPos.copy(currentPos);
                    moving = true;
                }

                // Process Right Hand Movement
                if (this.isRightGrabbing && this.data.rightHand) {
                    const currentPos = this.data.rightHand.object3D.position;
                    const delta = new THREE.Vector3().subVectors(currentPos, this.prevRightPos);
                    
                    delta.y = 0; 
                    rigPos.addScaledVector(delta, -this.data.multiplier);
                    
                    this.prevRightPos.copy(currentPos);
                    moving = true;
                }

                // Update HUD Feedback
                if (this.statusText) {
                    if (moving) {
                        this.statusText.setAttribute('value', 'Action: Grabbing & Pulling');
                        this.statusText.setAttribute('color', '#00FF00');
                    } else {
                        this.statusText.setAttribute('value', 'Status: Idle\nPinch and pull the air to move');
                        this.statusText.setAttribute('color', '#FFFFFF');
                    }
                }
            }
        });

        /**
         * 2. ENVIRONMENT GENERATOR
         * Simple procedural world to provide visual flow/reference.
         */
        AFRAME.registerComponent('environment-generator', {
            init: function () {
                // Ground
                const floor = document.createElement('a-plane');
                floor.setAttribute('rotation', '-90 0 0');
                floor.setAttribute('width', '200');
                floor.setAttribute('height', '200');
                floor.setAttribute('color', '#111');
                this.el.appendChild(floor);

                // Grid helper
                const grid = document.createElement('a-grid');
                grid.setAttribute('width', '200');
                grid.setAttribute('height', '200');
                this.el.appendChild(grid);

                // Markers/Pillars
                for (let i = 0; i < 100; i++) {
                    const pillar = document.createElement('a-cylinder');
                    const x = (Math.random() - 0.5) * 150;
                    const z = (Math.random() - 0.5) * 150;
                    if (Math.abs(x) < 5 && Math.abs(z) < 5) continue;

                    pillar.setAttribute('position', { x: x, y: 2, z: z });
                    pillar.setAttribute('radius', '0.2');
                    pillar.setAttribute('height', '4');
                    pillar.setAttribute('color', 'hsl(' + (Math.random() * 360) + ', 70%, 60%)');
                    this.el.appendChild(pillar);
                }
            }
        });
    </script>
</head>
<body>
    <a-scene webxr="optionalFeatures: hand-tracking">
        
        <!-- Procedural World -->
        <a-entity environment-generator></a-entity>

        <!-- Player Rig -->
        <a-entity id="rig" grab-locomotion position="0 0 0">
            <a-camera id="camera" position="0 1.6 0" wasd-controls-enabled="false">
                <!-- Status Display -->
                <a-text 
                    id="status-text" 
                    value="Initializing..." 
                    position="0 -0.4 -1" 
                    align="center" 
                    width="1.5"
                    font="mozillavr"
                ></a-text>
            </a-camera>

            <!-- Hand Entities -->
            <a-entity id="leftHand" hand-tracking-controls="hand: left;"></a-entity>
            <a-entity id="rightHand" hand-tracking-controls="hand: right;"></a-entity>
        </a-entity>

    </a-scene>
</body>
</html>
